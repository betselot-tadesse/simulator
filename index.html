
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manchester United Fans Football Play</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .display-font { font-family: 'Oswald', sans-serif; }

    @keyframes goal-shake {
      0% { transform: translate(0,0) rotate(0); }
      10% { transform: translate(-5px,-5px) rotate(-0.5deg); }
      20% { transform: translate(5px,5px) rotate(0.5deg); }
      30% { transform: translate(-5px,5px) rotate(-0.5deg); }
      40% { transform: translate(5px,-5px) rotate(0.5deg); }
      50% { transform: translate(0,0) rotate(0); }
    }

    .animate-goal-shake {
      animation: goal-shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      z-index: 150;
      pointer-events: none;
      animation: confetti-fall 1.5s linear forwards;
    }

    @keyframes flash-pulse {
      0% { opacity: 0; }
      20% { opacity: 0.6; }
      100% { opacity: 0; }
    }

    .celebration-flash {
      animation: flash-pulse 1.5s ease-out forwards;
    }
    
    .animate-spin-slow {
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen overflow-x-hidden">
  <div id="root"></div>
</body>
</html>
